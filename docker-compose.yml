services:
  # ── Backend API ────────────────────────────────────────────────────────────
  backend:
    image: ghcr.io/maulik-sharma/busnirikshan-backend:latest
    container_name: busnirikshan-backend
    ports:
      - "5001:5000"
    environment:
      # ── Database & Cache ──────────────────────────────────────────────
      MONGODB_URI: "${MONGODB_URI}"
      REDIS_URL: "${REDIS_URL}"
      # ── API ───────────────────────────────────────────────────────────
      PORT: "${PORT}"
      SALT_ROUNDS: "${SALT_ROUNDS}"
      ACCESS_TOKEN_SECRET: "${ACCESS_TOKEN_SECRET}"
      REFRESH_TOKEN_SECRET: "${REFRESH_TOKEN_SECRET}"
      RESET_TOKEN_SECRET: "${RESET_TOKEN_SECRET}"
      FRONTEND_URL: "${FRONTEND_URL:-http://localhost:3000}"
      # ── Email ─────────────────────────────────────────────────────────
      SMTP_HOST: "${SMTP_HOST:-smtp.gmail.com}"
      SMTP_PORT: "${SMTP_PORT:-465}"
      SMTP_AUTH: "${SMTP_AUTH:-true}"
      SMTP_USER: "${SMTP_USER}"
      SMTP_PASS: "${SMTP_PASS}"
    depends_on:
      mongo:
        condition: service_started
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - busnirikshan-net

  # ── MongoDB ────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: busnirikshan-mongo
    ports:
      - "27018:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped
    networks:
      - busnirikshan-net

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: busnirikshan-redis
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - busnirikshan-net

# ── Persistent volumes ────────────────────────────────────────────────────────
volumes:
  mongo-data:
  redis-data:

# ── Network ───────────────────────────────────────────────────────────────────
networks:
  busnirikshan-net:
    driver: bridge
