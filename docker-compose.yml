services:
  # ── Backend API ────────────────────────────────────────────────────────────
  busnirikshanbackend:
    image: ghcr.io/maulik-sharma/busnirikshan-backend:latest
    container_name: busnirikshanbackend
    hostname: busnirikshanbackend
    ports:
      - "5001:5000"
    environment:
      # ── Database & Cache ──────────────────────────────────────────────
      MONGODB_URI: "${MONGODB_URI}"
      REDIS_URL: "${REDIS_URL}"
      # ── API ───────────────────────────────────────────────────────────
      PORT: "${PORT}"
      SALT_ROUNDS: "${SALT_ROUNDS}"
      ACCESS_TOKEN_SECRET: "${ACCESS_TOKEN_SECRET}"
      REFRESH_TOKEN_SECRET: "${REFRESH_TOKEN_SECRET}"
      RESET_TOKEN_SECRET: "${RESET_TOKEN_SECRET}"
      FRONTEND_URL: "${FRONTEND_URL:-http://localhost:3000}"
      # ── Email ─────────────────────────────────────────────────────────
      SMTP_HOST: "${SMTP_HOST:-smtp.gmail.com}"
      SMTP_PORT: "${SMTP_PORT:-465}"
      SMTP_AUTH: "${SMTP_AUTH:-true}"
      SMTP_USER: "${SMTP_USER}"
      SMTP_PASS: "${SMTP_PASS}"
    restart: unless-stopped
    networks:
      - portfolio

  # ── Frontend App ──────────────────────────────────────────────────────────
  busnirikshanfrontend:
    image: ghcr.io/maulik-sharma/busnirikshan-frontend:latest
    container_name: busnirikshanfrontend
    hostname: busnirikshanfrontend
    ports:
      - "3001:3000"
    depends_on:
      - busnirikshanbackend
    restart: unless-stopped
    networks:
      - portfolio

# ── Network ───────────────────────────────────────────────────────────────────
networks:
  portfolio:
    name: portfolio
    driver: bridge
